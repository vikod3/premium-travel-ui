<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Anton&display=swap" rel="stylesheet">
  <style>
    body { margin: 0; background: #BEE7EC; }
    @font-face {
      font-family: 'Dilemma Sans Black CD';
      src: url('./fonts/dilemma-sans-black-cd.otf') format('opentype');
      font-weight: 900;
      font-style: normal;
    }
    @font-face {
      font-family: 'Roswell Three ITC';
      src: url('./fonts/Roswell-Three-ITC-Regular.otf') format('opentype');
      font-weight: normal;
      font-style: normal;
    }
  </style>
</helmet>

<div style="min-height: 100vh; position: relative; overflow: hidden; background: linear-gradient(175deg, #A8E4EC 0%, #BFE3E9 40%, #CDD3E6 100%); display: flex; align-items: center; justify-content: center; padding: 90px 60px; box-sizing: border-box;">

  <div style="position: absolute; top: -40px; left: 50%; transform: translateX(-50%); font-family: 'Anton', sans-serif; font-size: 260px; letter-spacing: 6px; color: rgba(255,255,255,0.28); white-space: nowrap; pointer-events: none; user-select: none;">ZENITH ESCAPES</div>

  <div data-screen-label="Getaway detail" style="position: relative;">
    <x-import component-from-global-scope="IOSDevice" from="./ios-frame.jsx" width="{{ 370 }}" height="{{ 790 }}" dark="{{ true }}" time="11:11" hint-size="370px,790px">
      <svg width="0" height="0" style="position: absolute;">
        <filter id="grade" color-interpolation-filters="sRGB">
          <feColorMatrix type="matrix" values="
             0.6666 -0.0742  0.0785 0 0.1499
            -0.0627  0.7320  0.0649 0 0.0943
            -0.0701  0.1109  0.7276 0 0.0471
             0       0       0      1 0"></feColorMatrix>
        </filter>
      </svg>
      <div style="height: 100%; position: relative; overflow: hidden;">
        <sc-if value="{{ goldenHour }}" hint-placeholder-val="{{ true }}">
          <img src="./images/bali-poolside-palms.png" alt="Golden palms at the beach" style="position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; filter: url(#grade); transform: {{ bgTransform }};">
        </sc-if>
        <sc-if value="{{ notGoldenHour }}" hint-placeholder-val="{{ false }}">
          <img src="https://images.unsplash.com/photo-1518548419970-58e3b4079ab2?w=900&q=80" alt="Bali jungle palms" style="position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; filter: url(#grade); transform: {{ bgTransform }};">
        </sc-if>
        <div style="position: absolute; inset: 0 0 auto 0; height: 22%; background: linear-gradient(to bottom, rgba(8,12,16,0.30), transparent); pointer-events: none;"></div>
        <div style="position: absolute; inset: 0; pointer-events: none;">
          <div style="position: absolute; inset: 0; backdrop-filter: blur(1px); -webkit-backdrop-filter: blur(1px); mask: radial-gradient(circle at 55% 115%, black 480px, transparent 545px); -webkit-mask: radial-gradient(circle at 55% 115%, black 480px, transparent 545px);"></div>
          <div style="position: absolute; inset: 0; backdrop-filter: blur(1.5px); -webkit-backdrop-filter: blur(1.5px); mask: radial-gradient(circle at 55% 115%, black 440px, transparent 505px); -webkit-mask: radial-gradient(circle at 55% 115%, black 440px, transparent 505px);"></div>
          <div style="position: absolute; inset: 0; backdrop-filter: blur(3px); -webkit-backdrop-filter: blur(3px); mask: radial-gradient(circle at 55% 115%, black 390px, transparent 455px); -webkit-mask: radial-gradient(circle at 55% 115%, black 390px, transparent 455px);"></div>
          <div style="position: absolute; inset: 0; backdrop-filter: blur(5px); -webkit-backdrop-filter: blur(5px); mask: radial-gradient(circle at 55% 115%, black 320px, transparent 395px); -webkit-mask: radial-gradient(circle at 55% 115%, black 320px, transparent 395px);"></div>
          <div style="position: absolute; inset: 0; backdrop-filter: blur(7px); -webkit-backdrop-filter: blur(7px); mask: radial-gradient(circle at 55% 115%, black 240px, transparent 325px); -webkit-mask: radial-gradient(circle at 55% 115%, black 240px, transparent 325px);"></div>
          <div style="position: absolute; inset: 0; backdrop-filter: blur(9px); -webkit-backdrop-filter: blur(9px); mask: radial-gradient(circle at 55% 115%, black 130px, transparent 235px); -webkit-mask: radial-gradient(circle at 55% 115%, black 130px, transparent 235px);"></div>
        </div>
        <div style="position: absolute; inset: 0; pointer-events: none; background: linear-gradient(to top, rgba(110,160,195,0.30) 0%, rgba(110,160,195,0.19) 7%, rgba(112,160,192,0.07) 16%, transparent 34%), linear-gradient(285deg, rgba(240,225,205,0.18) 0%, rgba(240,225,205,0.09) 24%, transparent 48%), radial-gradient(ellipse 60% 30% at 0% 76%, rgba(5,25,75,0.20), transparent 70%);"></div>

        <div style="position: absolute; inset: 0; display: flex; flex-direction: column; box-sizing: border-box; padding: 64px 24px 48px;">
          <div style="display: flex; align-items: center; justify-content: space-between;">
            <svg width="18" height="14" viewBox="0 0 18 14" fill="none" style="flex-shrink: 0; transform: rotate(90deg);">
              <path d="M9 1V11" stroke="#fff" stroke-width="2.2" stroke-linecap="round"></path>
              <path d="M4 8L9 13L14 8" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"></path>
            </svg>
            <span style="display: flex; flex-direction: column; gap: 5px;">
              <span style="width: 18px; height: 2px; background: #fff;"></span>
              <span style="width: 18px; height: 2px; background: #fff;"></span>
            </span>
          </div>

          <div style="text-align: center; margin-top: 46px;">
            <div style="font-family: 'Dilemma Sans Black CD', 'Anton', sans-serif; font-size: 52px; font-weight: 900; line-height: 1.0; letter-spacing: 0.5px; color: #fff; text-transform: uppercase; text-shadow: 0 2px 18px rgba(0,0,0,0.35);">Bali Exclusive<br>Luxury Getaway</div>
            <div style="margin-top: 8px; display: flex; align-items: baseline; justify-content: center; gap: 5px;">
              <span style="font-family: Helvetica, Arial, sans-serif; font-size: 13px; font-weight: 700; color: rgba(255,255,255,0.85);">by</span>
              <span style="font-family: 'Dilemma Sans Black CD', 'Anton', sans-serif; font-weight: 900; font-size: 22px; letter-spacing: 1px; color: #fff;">ZENITH ESCAPES</span>
            </div>
          </div>

          <sc-if value="{{ showSparkles }}" hint-placeholder-val="{{ true }}">
            <div style="flex: 1; display: flex; align-items: flex-start; justify-content: center; padding-top: 40px;">
              <svg width="30" height="30" viewBox="0 0 1024 1024" style="filter: drop-shadow(0 2px 10px rgba(0,0,0,0.35));">
                <path d="M87 116C260 108 408 168 512 300C616 168 764 108 937 116C945 289 885 437 753 541C885 645 945 793 937 966C764 974 616 914 512 782C408 914 260 974 87 966C79 793 139 645 271 541C139 437 79 289 87 116Z" fill="#fff"></path>
              </svg>
            </div>
          </sc-if>

          <div style="margin-top: auto; display: flex; flex-direction: column; gap: 20px;">
            <div style="display: grid; grid-template-columns: auto auto; justify-content: start; gap: 12px;">
              <div style="display: flex; flex-direction: column; gap: 6px;">
                <span style="font-family: Helvetica, Arial, sans-serif; font-size: 11px; font-weight: 700; color: rgba(255,255,255,0.75);">Exclusive</span>
                <span style="font-family: 'Roswell Three ITC', sans-serif; font-size: 33px; letter-spacing: 0.5px; color: #fff;">{{ guests }} GUESTS</span>
              </div>
              <div style="display: flex; flex-direction: column; gap: 6px; margin-left: 48px;">
                <span style="font-family: Helvetica, Arial, sans-serif; font-size: 11px; font-weight: 700; color: rgba(255,255,255,0.75);">Availability</span>
                <span style="font-family: 'Roswell Three ITC', sans-serif; font-size: 33px; letter-spacing: 0.5px; color: #fff;">{{ days }} DAYS</span>
              </div>
            </div>
            <div style="display: flex; align-items: flex-end; gap: 16px;">
              <div style="flex: 1; font-family: Helvetica, Arial, sans-serif; font-size: 12.5px; line-height: 1.55; color: rgba(255,255,255,0.92); max-width: 270px;">Escape to an elite getaway, where every detail is meticulously designed to meet the highest expectations of luxury and serenity.</div>
              <svg width="18" height="14" viewBox="0 0 18 14" fill="none" style="flex-shrink: 0; margin-left: 22px;">
                <path d="M9 1V11" stroke="#fff" stroke-width="2.2" stroke-linecap="round"></path>
                <path d="M4 8L9 13L14 8" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"></path>
              </svg>
            </div>
          </div>
        </div>
      </div>
    </x-import>
  </div>

</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;goldenHour&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;},&quot;showSparkles&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;},&quot;guests&quot;:{&quot;editor&quot;:&quot;int&quot;,&quot;default&quot;:8,&quot;tsType&quot;:&quot;number&quot;},&quot;days&quot;:{&quot;editor&quot;:&quot;int&quot;,&quot;default&quot;:12,&quot;tsType&quot;:&quot;number&quot;},&quot;bgScale&quot;:{&quot;editor&quot;:&quot;range&quot;,&quot;default&quot;:1.07,&quot;min&quot;:1,&quot;max&quot;:1.8,&quot;step&quot;:0.01,&quot;tsType&quot;:&quot;number&quot;,&quot;section&quot;:&quot;Background image&quot;},&quot;bgX&quot;:{&quot;editor&quot;:&quot;range&quot;,&quot;default&quot;:0,&quot;min&quot;:-30,&quot;max&quot;:30,&quot;step&quot;:1,&quot;tsType&quot;:&quot;number&quot;,&quot;unit&quot;:&quot;%&quot;,&quot;section&quot;:&quot;Background image&quot;},&quot;bgY&quot;:{&quot;editor&quot;:&quot;range&quot;,&quot;default&quot;:-4,&quot;min&quot;:-30,&quot;max&quot;:30,&quot;step&quot;:1,&quot;tsType&quot;:&quot;number&quot;,&quot;unit&quot;:&quot;%&quot;,&quot;section&quot;:&quot;Background image&quot;}}">
class Component extends DCLogic {
  renderVals() {
    const golden = this.props.goldenHour ?? true;
    const bgScale = this.props.bgScale ?? 1;
    const bgX = this.props.bgX ?? 0;
    const bgY = this.props.bgY ?? 0;
    return {
      showSparkles: this.props.showSparkles ?? true,
      guests: this.props.guests ?? 8,
      days: this.props.days ?? 12,
      goldenHour: golden,
      notGoldenHour: !golden,
      bgTransform: `translate(${bgX}%, ${bgY}%) scale(${bgScale})`,
    };
  }
}
</script>
</body>
</html>
