    background-position: center 30%;
    /* vibrance / warmth lift seen in the mockup */
    filter: saturate(0.84) contrast(1.05);
    z-index: 0;
  }

  /* warm olive haze across the WHOLE image — the film-like filter */
  .card .haze {
    position: absolute;
    inset: 0;
    z-index: 1;
    background: rgba(122, 107, 82, 0.21);
  }

  /* soft blur that creeps up from the bottom of the photo */
  .card .blur {
    position: absolute;
    inset: 0;
    z-index: 2;
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    -webkit-mask-image: linear-gradient(to top, black 0%, black 18%, transparent 58%);
    mask-image: linear-gradient(to top, black 0%, black 18%, transparent 58%);
  }

  /* deep-green gradient wash — the "filter" over the image */
  .card .tint {
    position: absolute;
    inset: 0;
    z-index: 3;
    background: linear-gradient(
      to top,
      rgba(26, 66, 4, 0.96) 0%,
      rgba(30, 72, 6, 0.82) 16%,
      rgba(34, 78, 10, 0.48) 34%,
      rgba(40, 86, 14, 0.16) 52%,
      rgba(0, 0, 0, 0) 68%
    );
  }

  /* --- close (X) icon --- */
  .close {
    position: absolute;
    top: 22px;
    left: 22px;
    z-index: 5;
    width: 18px;
    height: 18px;
    cursor: pointer;
  }
  .close::before, .close::after {
    content: "";
    position: absolute;
    top: 50%; left: 50%;
    width: 20px; height: 2px;
    background: #ffffff;
    border-radius: 2px;
  }
  .close::before { transform: translate(-50%, -50%) rotate(45deg); }
  .close::after  { transform: translate(-50%, -50%) rotate(-45deg); }

  /* --- content --- */
  .content {
    position: absolute;
    z-index: 4;
    left: 0; right: 0; bottom: 0;
    padding: 26px 26px 26px;
    color: #ffffff;
  }

  .content h2 {
    font-family: 'Poppins', 'Inter', sans-serif;
    font-weight: 400;
    font-size: 27px;
    line-height: 1.22;
    letter-spacing: 0.2px;
    margin-bottom: 12px;
    max-width: 240px;
  }

  .content p {
    font-size: 12.5px;
    font-weight: 400;
    line-height: 1.5;
    color: rgba(255, 255, 255, 0.92);
    max-width: 250px;
    margin-bottom: 18px;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: #c3e9f0;               /* pale cyan pill */
    color: #10240a;
    border: none;
    border-radius: 999px;
    padding: 11px 20px;
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    cursor: pointer;
    transition: transform 0.15s ease, filter 0.15s ease;
  }
  .btn:hover { transform: translateY(-1px); filter: brightness(1.03); }
  .btn svg { width: 15px; height: 15px; }
</style>
</head>
<body>

  <div class="card">
    <div class="photo"></div>
    <div class="haze"></div>
    <div class="blur"></div>
    <div class="tint"></div>

    <div class="close" aria-label="Close"></div>

    <div class="content">
      <h2>Bali Exclusive<br>Luxury Getaway</h2>
      <p>Breathtaking locations, bespoke services, with a focus on exclusivity</p>
      <button class="btn">
        View Offer
        <svg viewBox="0 0 24 24" fill="none" stroke="#10240a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7z"/>
          <circle cx="12" cy="12" r="3"/>
        </svg>
      </button>
    </div>
  </div>

</body>
